<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kinder-finance-app</title>
  <script>
    // Single Page App routing for GitHub Pages
    const path = window.location.pathname;
    const repo = '/kinder-finance-app';
    
    // Redirect to index.html if not already there
    if (path !== repo + '/' && path !== repo + '/index.html') {
      window.location.href = repo + '/';
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
